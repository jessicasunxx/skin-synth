<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Skin Synth Web Visuals</title>
  <style>
    html,body{height:100%;margin:0;background:#0f0f1e;color:#fff}
    canvas{display:block;width:100%;height:100%}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const ws = new WebSocket('ws://' + location.hostname + ':8765');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let mode = 1;
let pads = [0,0,0,0,0];

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

ws.onmessage = (e) => {
  const d = JSON.parse(e.data);
  mode = d.mode;
  pads = d.pads;
}

// Setup audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const freqs = [220, 261.63, 293.66, 329.63, 392.00];
function playTone(i, mode){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = (mode==1)?'sine':'square';
  o.frequency.value = freqs[i] * ((mode==1)?1:1.5);
  g.gain.value = (mode==1)?0.12:0.22;
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.25);
  setTimeout(()=>o.stop(), 260);
}

let prev = [0,0,0,0,0];
function draw(){
  const w = canvas.width, h = canvas.height;
  ctx.fillStyle = (mode==1)?'#0f1530':'#301010';
  ctx.fillRect(0,0,w,h);
  const positions = [
    [w*0.12, h*0.6],
    [w*0.32, h*0.5],
    [w*0.52, h*0.6],
    [w*0.72, h*0.5],
    [w*0.88, h*0.25]
  ];
  const r = Math.min(w,h)*0.08;
  const cols = ['#ff7878','#78ff78','#7878ff','#ffff78','#ffffff'];
  for(let i=0;i<5;i++){
    if(pads[i]){
      ctx.fillStyle = cols[i];
      if(i%2==0) ctx.beginPath(), ctx.arc(positions[i][0], positions[i][1], r,0,Math.PI*2), ctx.fill();
      else ctx.fillRect(positions[i][0]-r, positions[i][1]-r, r*2, r*2);
    }
    if(pads[i] && !prev[i]) playTone(i, mode);
  }
  prev = pads.slice();
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
